spring:
  profiles:
    active: mongo

  datasource:
    url: jdbc:postgresql://localhost:5433/biblioteca_db
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
      database: biblioteca_db

server:
  port: ${PORT:80} # Azure inyecta la variable PORT automáticamente
  ssl:
    enabled: false # Desactívalo para el despliegue inicial